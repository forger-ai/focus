name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: focus-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Backend lint
        run: docker compose run --rm backend uv run --extra dev ruff check .

      - name: Backend tests
        run: docker compose run --rm backend uv run --extra dev pytest

      - name: Frontend build
        run: docker compose run --rm --no-deps frontend npm run build

      - name: Cleanup
        if: always()
        run: docker compose down --remove-orphans
