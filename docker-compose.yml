services:
  backend:
    extends:
      file: ./commons/docker-compose.base.yml
      service: backend
    build:
      context: ./backend
      dockerfile: ../commons/backend/Dockerfile
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: sqlite:////app/data/focus.dev.sqlite
      CORS_ORIGINS: http://localhost:5186,http://127.0.0.1:5186
    command: uv run fastapi dev src/app/main.py --host 0.0.0.0 --port 8006
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./commons/backend/database.py:/app/src/app/database.py
      - ./commons/backend/health.py:/app/src/app/health.py
      - ./commons/backend/cors.py:/app/src/app/cors.py

  frontend:
    extends:
      file: ./commons/docker-compose.base.yml
      service: frontend
    build:
      context: ./frontend
      dockerfile: ../commons/frontend/Dockerfile
    ports:
      - "5186:5186"
    environment:
      VITE_API_BASE_URL: http://localhost:8006
    command: npm run dev -- --host 0.0.0.0 --port 5186
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./commons/frontend/client.ts:/app/src/api/client.ts
    depends_on:
      - backend

volumes:
  frontend_node_modules:
